services:
  postgres:
    image: postgres:16-alpine
    container_name: salon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salon
      POSTGRES_USER: salon_user
      POSTGRES_PASSWORD: salon_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon_user -d salon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salon_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
